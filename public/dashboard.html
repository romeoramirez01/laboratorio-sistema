<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Laboratorio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h2 id="welcomeTitle">Bienvenido</h2>
        <button onclick="logout()">Cerrar Sesión</button>
    </nav>
    <div id="content">
        <h3>Cargando...</h3>
    </div>

    <script>
        // Verificar si el usuario está autenticado
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = '/index.html';
        }

        // Actualizar el título de bienvenida
        document.getElementById('welcomeTitle').innerText = `Bienvenido, ${user.nombre}`;
        
        // Mostrar contenido según el rol
        const content = document.getElementById('content');
                if (user.rol === 'admin') {
                        content.innerHTML = `
                                <h3>📋 Panel de Administrador</h3>
                                <p>Puedes gestionar los pacientes, signos vitales y resultados de exámenes.</p>

                                <section style="margin-top:1rem; padding:1rem; border:1px solid #e1e1e1; background:#fff;">
                                    <h4>Registrar Paciente</h4>
                                    <form id="patientForm">
                                        <input type="text" id="dui" placeholder="DUI" />
                                        <input type="text" id="nombres" placeholder="Nombres" required />
                                        <input type="text" id="apellidos" placeholder="Apellidos" required />
                                        <input type="date" id="fecha_nacimiento" placeholder="Fecha de nacimiento" />
                                        <input type="text" id="telefono" placeholder="Teléfono" />
                                        <input type="email" id="correo" placeholder="Correo" />
                                        <button type="submit">Registrar Paciente</button>
                                    </form>
                                    <div id="patientMessage" style="margin-top:0.5rem;color:#333"></div>
                                </section>

                                <section style="margin-top:1rem; padding:1rem; border:1px solid #e1e1e1; background:#fff;">
                                    <h4>Registrar Signos Vitales</h4>
                                    <form id="signsForm">
                                        <input type="number" id="paciente_id_signs" placeholder="ID Paciente" required />
                                        <input type="text" id="presion_arterial" placeholder="Presión arterial (ej. 120/80)" />
                                        <input type="number" id="frecuencia_cardiaca" placeholder="Frecuencia cardiaca" />
                                        <input type="number" step="0.1" id="temperatura" placeholder="Temperatura (°C)" />
                                        <input type="number" step="0.1" id="peso" placeholder="Peso (kg)" />
                                        <input type="number" step="0.01" id="altura" placeholder="Altura (m)" />
                                        <textarea id="notas" placeholder="Notas"></textarea>
                                        <button type="submit">Registrar Signos</button>
                                    </form>
                                    <div id="signsMessage" style="margin-top:0.5rem;color:#333"></div>
                                </section>

                                <section style="margin-top:1rem; padding:1rem; border:1px solid #e1e1e1; background:#fff;">
                                    <h4>Agregar Resultado de Examen</h4>
                                    <input id="exSearch" placeholder="Buscar examen (nombre o código)" />
                                    <div id="exResults" style="margin-top:0.5rem"></div>
                                    <form id="examResultForm" style="margin-top:0.5rem">
                                        <input type="number" id="paciente_id_exam" placeholder="ID Paciente" required />
                                        <input type="hidden" id="examen_id" />
                                        <textarea id="resultados_json" placeholder='Resultados JSON, p.ej. {"glucosa":"95 mg/dL"}'></textarea>
                                        <button type="submit">Guardar Resultado</button>
                                    </form>
                                    <div id="examMessage" style="margin-top:0.5rem;color:#333"></div>
                                </section>
                        `;
                } else {
            content.innerHTML = `
                <h3>📊 Mis Exámenes</h3>
                <p>Aquí puedes ver el estado de tus exámenes y resultados.</p>
                <div style="margin-top: 2rem; padding: 1rem; background: #f8f9fa; border-left: 4px solid #667eea;">
                    <p><strong>Estado:</strong> Sin exámenes pendientes</p>
                </div>
            `;
        }
        

        // Función para cerrar sesión
        function logout() {
            if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
                localStorage.clear();
                window.location.href = '/index.html';
            }
        }

                // Helpers: obtener token
                function getToken() {
                        return localStorage.getItem('token');
                }

                // Attach handlers only if admin
                if (user.rol === 'admin') {
                    // Registrar paciente
                    document.getElementById('patientForm').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const data = {
                            dui: document.getElementById('dui').value || null,
                            nombres: document.getElementById('nombres').value,
                            apellidos: document.getElementById('apellidos').value,
                            fecha_nacimiento: document.getElementById('fecha_nacimiento').value || null,
                            telefono: document.getElementById('telefono').value || null,
                            correo: document.getElementById('correo').value || null
                        };
                        const resEl = document.getElementById('patientMessage');
                        try {
                            const res = await fetch('/api/admin/pacientes', { method: 'POST', headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + getToken() }, body: JSON.stringify(data) });
                            const body = await res.json();
                            resEl.innerText = (body.message || JSON.stringify(body));
                        } catch (err) { resEl.innerText = 'Error de conexión'; }
                    });

                    // Registrar signos
                    document.getElementById('signsForm').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const data = {
                            paciente_id: Number(document.getElementById('paciente_id_signs').value),
                            presion_arterial: document.getElementById('presion_arterial').value || null,
                            frecuencia_cardiaca: Number(document.getElementById('frecuencia_cardiaca').value) || null,
                            temperatura: Number(document.getElementById('temperatura').value) || null,
                            peso: Number(document.getElementById('peso').value) || null,
                            altura: Number(document.getElementById('altura').value) || null,
                            notas: document.getElementById('notas').value || null
                        };
                        const resEl = document.getElementById('signsMessage');
                        try {
                            const res = await fetch('/api/admin/signos', { method: 'POST', headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + getToken() }, body: JSON.stringify(data) });
                            const body = await res.json();
                            resEl.innerText = (body.message || JSON.stringify(body));
                        } catch (err) { resEl.innerText = 'Error de conexión'; }
                    });

                    // Buscar examenes
                    const exSearch = document.getElementById('exSearch');
                    exSearch.addEventListener('input', async (e) => {
                        const q = exSearch.value.trim();
                        const container = document.getElementById('exResults');
                        container.innerHTML = '';
                        if (!q) return;
                        try {
                            const res = await fetch('/api/admin/examenes?q=' + encodeURIComponent(q), { headers: { 'Authorization': 'Bearer ' + getToken() }});
                            const body = await res.json();
                            (body.exams || []).forEach(ex => {
                                const b = document.createElement('button');
                                b.innerText = ex.nombre + ' (' + ex.codigo + ')';
                                b.style.display = 'block';
                                b.onclick = () => { document.getElementById('examen_id').value = ex.id; document.getElementById('exResults').innerText = 'Seleccionado: ' + ex.nombre; };
                                container.appendChild(b);
                            });
                        } catch (err) { container.innerText = 'Error buscando exámenes'; }
                    });

                    // Guardar resultado de examen
                    document.getElementById('examResultForm').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const paciente_id = Number(document.getElementById('paciente_id_exam').value);
                        const examen_id = Number(document.getElementById('examen_id').value);
                        let resultados = null;
                        try { resultados = JSON.parse(document.getElementById('resultados_json').value); } catch(e) { resultados = null; }
                        const resEl = document.getElementById('examMessage');
                        try {
                            const res = await fetch('/api/admin/examenes/resultados', { method: 'POST', headers: { 'Content-Type':'application/json', 'Authorization': 'Bearer ' + getToken() }, body: JSON.stringify({ paciente_id, examen_id, resultados }) });
                            const body = await res.json();
                            resEl.innerText = (body.message || JSON.stringify(body));
                        } catch (err) { resEl.innerText = 'Error de conexión'; }
                    });
                }
    </script>
</body>
</html>
